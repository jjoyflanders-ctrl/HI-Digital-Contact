<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HI | Connect</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- DESKTOP -->
<section class="desk">
  <div class="stage desk-stage">
    <img src="assets/desktop-template.svg" class="template"/>
    <div class="photo-overlay"><img id="deskPhoto"></div>
    <div class="name" id="deskName"></div>
    <div class="title" id="deskTitle"></div>
  </div>
</section>

<!-- MOBILE -->
<section class="mobi">
  <div class="stage mobi-stage">
    <img src="assets/mobile-template.svg" class="template"/>
    <div class="mobi-photo-overlay"><img id="mobiPhoto"></div>
    <div class="mobi-name" id="mobiName"></div>
    <div class="mobi-title" id="mobiTitle"></div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
